<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Calculator</title>
</head>

<body>
    <div class="calculator">
        <input type="text" id="display" disabled><br><br>

        <div class="buttons">
            <button onclick="putValue('7')">7</button>
            <button onclick="putValue('8')">8</button>
            <button onclick="putValue('9')">9</button>
            <button onclick="putValue('+')" id="color">+</button>

            <button onclick="putValue('4')">4</button>
            <button onclick="putValue('5')">5</button>
            <button onclick="putValue('6')">6</button>
            <button onclick="putValue('-')" id="color">-</button>

            <button onclick="putValue('1')">1</button>
            <button onclick="putValue('2')">2</button>
            <button onclick="putValue('3')">3</button>
            <button onclick="putValue('*')" id="color">x</button>

            <button onclick="clearDisplay()" id="red">C</button>
            <button onclick="putValue()">0</button>
            <button onclick="calculate()" id="color">=</button>
            <button onclick="putValue('/')" id="color">/</button>
        </div>

    </div>
</body>

</html>
